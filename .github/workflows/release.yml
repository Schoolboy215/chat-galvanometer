name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: dotnet publish ChatGalvanometer.csproj -c Release -o publish

      - name: Zip release
        run: Compress-Archive -Path publish\ChatGalvanometer.exe, publish\authPage.html -DestinationPath ChatGalvanometer.zip

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: ChatGalvanometer.zip
